# Windows build — produces Saleem's AI Factory NSIS installers for x64
# on a native windows-latest (x64) runner.
#
# Output: the x64 installer uploaded to the workflow run.

name: Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        shell: bash
        run: npm run build 2>&1 | tee frontend-build.log
        continue-on-error: true

      - name: Build installer
        shell: bash
        run: |
          set -o pipefail
          npm run tauri build -- --config '{"bundle":{"createUpdaterArtifacts":false}}' 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload debug logs
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-logs
          path: |
            frontend-build.log
            build.log
            src-tauri/target/**/bundle/nsis/*.exe
            src-tauri/target/**/*.log
          if-no-files-found: continue

      - name: Upload installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: saleems-ai-factory-windows
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
