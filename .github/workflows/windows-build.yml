# Windows build — produces Saleem's AI Factory NSIS installer for x64
# on a native windows-latest (x64) runner.

name: Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (vite build)
        run: npm run build

      - name: Check Cargo.toml validity
        shell: bash
        run: head -5 src-tauri/Cargo.toml

      - name: Verify Rust compiles (cargo check)
        working-directory: src-tauri
        run: cargo check

      - name: Build Tauri app (+ bundle)
        shell: bash
        run: npm run tauri build -- --config '{"bundle":{"createUpdaterArtifacts":false}}'
        env:
          NODE_ENV: production

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: saleems-ai-factory-windows
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
