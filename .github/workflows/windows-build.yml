# Windows build — produces Saleem's AI Factory NSIS installer for x64
# on a native windows-latest (x64) runner, then attaches it to the tag release.

name: Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build x64 NSIS installer
        shell: bash
        run: npm run tauri build -- --target x86_64-pc-windows-msvc --bundles nsis --config '{"bundle":{"createUpdaterArtifacts":false}}'
        env:
          NODE_ENV: production

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: saleems-ai-factory-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Saleem's AI Factory ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
